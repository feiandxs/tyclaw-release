          done

          # Keep stable updater metadata tied to tagged releases only.
          if [ "${{ steps.upload.outputs.explicit_tag }}" = "true" ]; then
            cp "$RELEASE_DIR"/latest-mac.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") to macos/arm64..."
            aws s3 cp "$f" "${MAC_TARGET}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  build-win:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'windows-x64')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'windows-x64'))
      }}
    runs-on: windows-latest
    steps:
      - name: Clone source from GitLab
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $TAG = "${{ github.event.inputs.tag }}"
          } else {
            $TAG = "${{ github.event.client_payload.tag }}"
          }
          $repoUrl = "https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if ($TAG) {
            Write-Host "Cloning tagged source: $TAG"
            git clone --depth 1 --branch $TAG $repoUrl source
          } else {
            Write-Host "No tag provided, cloning default branch HEAD"
            git clone --depth 1 $repoUrl source
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Read source commit
        id: git_ref
        working-directory: source
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Source short SHA: $SHORT_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.arch }}
          workspaces: |
            source/crates -> target

      - name: Build tailos CLI
        working-directory: source
        shell: bash
        run: |
          cargo build --release -p tailos-cli --manifest-path crates/Cargo.toml
          mkdir -p apps/desktop/resources/bin
          cp crates/target/release/tailos.exe apps/desktop/resources/bin/

      - name: Inspect tailos.exe runtime dependencies
        working-directory: source
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $dumpbin = $null

          if (Test-Path $vswhere) {
            $vsInstallPath = & $vswhere -latest -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath

            if ($vsInstallPath) {
              $dumpbin = Get-ChildItem `
                (Join-Path $vsInstallPath 'VC\Tools\MSVC') `
                -Recurse -Filter dumpbin.exe `
                -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match 'Hostx64\\x64\\dumpbin\.exe$' } |
                Select-Object -First 1 -ExpandProperty FullName
            }
          }

          if (-not $dumpbin) {
            $dumpbin = Get-ChildItem `
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio" `
              "${env:ProgramFiles}\Microsoft Visual Studio" `
              -Recurse -Filter dumpbin.exe `
              -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match 'Hostx64\\x64\\dumpbin\.exe$' } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $dumpbin) {
            Write-Warning "dumpbin.exe not found, skipping dependency inspection"
            exit 0
          }

          Write-Host "Using dumpbin: $dumpbin"
          & $dumpbin /DEPENDENTS "crates\target\release\tailos.exe"

      - name: Download uv runtime
        working-directory: source/apps/desktop
        shell: bash
        run: |
          mkdir -p resources/bin
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          UV_ASSET_URL=$(python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen('https://api.github.com/repos/astral-sh/uv/releases/latest', timeout=20) as response:
              release = json.load(response)
          for asset in release['assets']:
              if asset['name'] == 'uv-x86_64-pc-windows-msvc.zip':
                  print(asset['browser_download_url'])
                  break
          else:
              raise SystemExit('Unable to find uv-x86_64-pc-windows-msvc.zip')
          PY
          )
          echo "Downloading uv from $UV_ASSET_URL"
          curl -fSL "$UV_ASSET_URL" -o "$TMP_DIR/uv.zip"
          unzip -o "$TMP_DIR/uv.zip" -d "$TMP_DIR/uv-extract"
          cp "$TMP_DIR/uv-extract/uv.exe" resources/bin/uv.exe
          echo "uv downloaded: $(ls -lh resources/bin/uv.exe)"
          resources/bin/uv.exe --version

      - name: Download ripgrep runtime
        working-directory: source/apps/desktop
        shell: bash
        run: |
          mkdir -p resources/bin
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          RIPGREP_VERSION=$(basename "$(curl -fsSL -o /dev/null -w '%{url_effective}' https://github.com/BurntSushi/ripgrep/releases/latest)")
          RG_ARCHIVE="ripgrep-${RIPGREP_VERSION}-x86_64-pc-windows-msvc.zip"
          echo "Downloading $RG_ARCHIVE..."
          curl -fSL -o "$TMP_DIR/rg.zip" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}/${RG_ARCHIVE}"
          unzip -o "$TMP_DIR/rg.zip" -d "$TMP_DIR/rg-extract"
          RG_DIR="$TMP_DIR/rg-extract/ripgrep-${RIPGREP_VERSION}-x86_64-pc-windows-msvc"
          cp "$RG_DIR/rg.exe" resources/bin/rg.exe
          echo "ripgrep downloaded: $(ls -lh resources/bin/rg.exe)"

      - name: Download Python runtime
        working-directory: source/apps/desktop
        shell: bash
        env:
          PYTHON_SERIES: ${{ env.PYTHON_STANDALONE_VERSION }}
          PYTHON_TARGET: x86_64-pc-windows-msvc
          PYTHON_PLATFORM: windows-x64
          PYTHON_ENTRY: python.exe
        run: |
          rm -rf resources/runtime/python
          mkdir -p resources/runtime/python
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          curl -fsSL https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest -o "$TMP_DIR/release.json"
          ASSET_URL=$(python - "$TMP_DIR/release.json" "$PYTHON_SERIES" "$PYTHON_TARGET" <<'PY'
          import json
          import sys
          from pathlib import Path

          release = json.loads(Path(sys.argv[1]).read_text())
          version = sys.argv[2]
          target = sys.argv[3]
          suffix = f"-{target}-install_only.tar.gz"
          prefix = f"cpython-{version}+"
          for asset in release["assets"]:
              name = asset["name"]
              if name.startswith(prefix) and name.endswith(suffix):
                  print(asset["browser_download_url"])
                  break
          else:
              raise SystemExit(f"Unable to find python-build-standalone asset for {version} / {target}")
          PY
          )
          echo "Downloading Python runtime from $ASSET_URL"
          curl -fSL "$ASSET_URL" -o "$TMP_DIR/python-runtime.tar.gz"
          tar -xzf "$TMP_DIR/python-runtime.tar.gz" --strip-components=1 -C resources/runtime/python
          PYTHON_VERSION=$(resources/runtime/python/python.exe --version 2>&1 | awk '{print $2}')
          python - "$PYTHON_VERSION" "$PYTHON_PLATFORM" "$PYTHON_ENTRY" <<'PY'
          import json
          import sys
          from pathlib import Path

          version, platform, entry = sys.argv[1:4]
          Path("resources/runtime/python/runtime.json").write_text(
              json.dumps(
                  {
                      "name": "python",
                      "implementation": "cpython",
                      "version": version,
                      "platform": platform,
                      "entry": entry,
                      "managed_by": "tyclaw-release",
                      "layout_version": 1,
                  },
                  indent=2,
              ) + "\n"
          )
          PY
          resources/runtime/python/python.exe --version

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: pnpm run build:release-assets

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Resolve upload channel
        id: upload
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -n "$TAG" ]; then
            echo "artifact_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_version=dev-${{ steps.git_ref.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows unpacked app
        working-directory: source/apps/desktop
        run: pnpm run package:dir:win

      - name: Smoke test Windows unpacked app
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          APP_NAME=$(node -p "require('./package.json').productName || require('./package.json').name")
          LEGACY_APP_NAME="TyClaw"
          APP_EXE=$(
            find "release/${VERSION}" \
              \( -path "*/win-unpacked/${APP_NAME}.exe" -o -path "*/win-unpacked/${LEGACY_APP_NAME}.exe" \) \
              -type f | head -n 1
          )
          if [ -z "$APP_EXE" ]; then
            echo "Unable to find ${APP_NAME}.exe or ${LEGACY_APP_NAME}.exe under release/${VERSION}" >&2
            exit 1
          fi
          if ! find "release/${VERSION}" -path '*/win-unpacked/resources/bin/rg.exe' -type f | grep -q .; then
            echo "Missing bundled rg.exe in Windows unpacked app resources" >&2
            exit 1
          fi
          if ! find "release/${VERSION}" -path '*/win-unpacked/resources/bin/uv.exe' -type f | grep -q .; then
            echo "Missing bundled uv.exe in Windows unpacked app resources" >&2
            exit 1
          fi
          BUNDLED_PYTHON=$(find "release/${VERSION}" -path '*/win-unpacked/resources/runtime/python/python.exe' -type f | head -n 1)
          if [ -z "$BUNDLED_PYTHON" ]; then
            echo "Missing bundled Python runtime in Windows unpacked app resources" >&2
            exit 1
          fi
          "$BUNDLED_PYTHON" --version
          node scripts/smoke-test-app.mjs "$APP_EXE"

      - name: Package Windows app (unsigned)
        working-directory: source/apps/desktop
        run: pnpm run package:release:win

      - name: Prepare changelog
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          mkdir -p "release/${VERSION}"
          cp changelog.yml "release/${VERSION}/"

      - name: Upload to R2
        working-directory: source/apps/desktop
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"
          UPLOAD_VERSION="${{ steps.upload.outputs.artifact_version }}"
          STAGING_DIR=$(mktemp -d)
          ROOT_TARGET="s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}"
          WIN_TARGET="${ROOT_TARGET}/windows/x64"

          pip3 install awscli --quiet

          if [ "${{ steps.upload.outputs.explicit_tag }}" = "true" ]; then
            aws s3 cp "$RELEASE_DIR/changelog.yml" "${ROOT_TARGET}/changelog.yml" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          fi

          if [[ "$UPLOAD_VERSION" == dev-* ]]; then
            EXISTING_DEV_FILES=$(aws s3 ls "${WIN_TARGET}/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              | awk '{print $4}' \
              | grep -- '-dev-' || true)
            for existing in $EXISTING_DEV_FILES; do
              echo "Removing stale dev artifact: $existing"
              aws s3 rm "${WIN_TARGET}/$existing" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            done
          fi

          for f in "$RELEASE_DIR"/*.exe "$RELEASE_DIR"/*.blockmap; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if [[ "$UPLOAD_VERSION" == dev-* ]]; then
              TARGET_NAME="${BASENAME//-${VERSION}-/-${UPLOAD_VERSION}-}"
            else
              TARGET_NAME="$BASENAME"
            fi
            cp "$f" "$STAGING_DIR/$TARGET_NAME"
          done

          # Keep stable updater metadata tied to tagged releases only.
          if [ "${{ steps.upload.outputs.explicit_tag }}" = "true" ]; then
            cp "$RELEASE_DIR"/latest.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") to windows/x64..."
            aws s3 cp "$f" "${WIN_TARGET}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  cleanup:
    runs-on: ubuntu-latest
    needs: [build-mac-x64, build-mac-arm64, build-win]
    if: always() && contains(fromJSON('["success","skipped"]'), needs.build-mac-x64.result) && contains(fromJSON('["success","skipped"]'), needs.build-mac-arm64.result) && contains(fromJSON('["success","skipped"]'), needs.build-win.result) && (needs.build-mac-x64.result == 'success' || needs.build-mac-arm64.result == 'success' || needs.build-win.result == 'success')
    steps:
      - name: Clean old versions on R2 (keep latest 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip3 install awscli --quiet

          clean_mac_dir() {
            local prefix="$1"
            local zips
            local count
            zips=$(aws s3 ls "s3://${R2_BUCKET}/${prefix}/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              | grep '\.zip$' | grep -v '\.blockmap' | grep -v -- '-dev-' | sort -k1,1r -k2,2r | awk '{print $4}')
            count=0
            for zip in $zips; do
              count=$((count + 1))
              if [ $count -gt 3 ]; then
                echo "Deleting old macOS artifact: ${prefix}/$zip"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}/$zip" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT }}"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}/${zip}.blockmap" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
              fi
            done
          }

          clean_mac_dir "${R2_RELEASE_PREFIX}/macos/x64"
          clean_mac_dir "${R2_RELEASE_PREFIX}/macos/arm64"

          EXES=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.exe$' | grep -v '\.blockmap' | grep -v -- '-dev-' | sort -k1,1r -k2,2r | awk '{print $4}')
          COUNT=0
          for exe in $EXES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old Windows artifact: windows/x64/$exe"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/$exe" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/${exe}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done
