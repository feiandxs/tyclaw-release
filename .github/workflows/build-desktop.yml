  build-win:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'windows-x64')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'windows-x64'))
      }}
    runs-on: windows-latest
    steps:
      - name: Clone source from GitLab
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $TAG = "${{ github.event.inputs.tag }}"
          } else {
            $TAG = "${{ github.event.client_payload.tag }}"
          }
          $repoUrl = "https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if ($TAG) {
            Write-Host "Cloning tagged source: $TAG"
            git clone --depth 1 --branch $TAG $repoUrl source
          } else {
            Write-Host "No tag provided, cloning default branch HEAD"
            git clone --depth 1 $repoUrl source
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Read source commit
        id: git_ref
        working-directory: source
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Source short SHA: $SHORT_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('source/pnpm-lock.yaml', 'source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('source/crates/Cargo.lock', 'source/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tailos CLI
        working-directory: source
        shell: bash
        run: |
          cargo build --release -p tailos-cli --manifest-path crates/Cargo.toml
          mkdir -p apps/desktop/resources/bin
          cp crates/target/release/tailos.exe apps/desktop/resources/bin/

      - name: Inspect tailos.exe runtime dependencies
        working-directory: source
        shell: pwsh
        run: |
          $dumpbin = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio" `
            -Recurse -Filter dumpbin.exe `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dumpbin) {
            Write-Warning "dumpbin.exe not found, skipping dependency inspection"
            exit 0
          }

          & $dumpbin /DEPENDENTS "crates\target\release\tailos.exe"

      - name: Download Bun runtime
        working-directory: source/apps/desktop
        shell: bash
        run: |
          mkdir -p resources/bin
          echo "Downloading Bun for windows-x64..."
          curl -fSL -o /tmp/bun.zip \
            "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip"
          unzip -o /tmp/bun.zip -d /tmp/bun-extract
          cp /tmp/bun-extract/bun-windows-x64/bun.exe resources/bin/bun.exe
          echo "Bun downloaded: $(ls -lh resources/bin/bun.exe)"
          rm -rf /tmp/bun.zip /tmp/bun-extract

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: pnpm run build:release-assets

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Resolve upload channel
        id: upload
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -n "$TAG" ]; then
            echo "artifact_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_version=dev-${{ steps.git_ref.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows unpacked app
        working-directory: source/apps/desktop
        run: pnpm run package:dir:win

      - name: Smoke test Windows unpacked app
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          APP_EXE=$(find "release/${VERSION}" -path '*/win-unpacked/TyClaw.exe' -type f | head -n 1)
          if [ -z "$APP_EXE" ]; then
            echo "Unable to find Windows app executable under release/${VERSION}" >&2
            exit 1
          fi
          node scripts/smoke-test-app.mjs "$APP_EXE"

      - name: Package Windows app (unsigned)
        working-directory: source/apps/desktop
        run: pnpm run package:release:win

      - name: Prepare changelog
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          mkdir -p "release/${VERSION}"
          cp changelog.yml "release/${VERSION}/"

      - name: Upload to R2
        working-directory: source/apps/desktop
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"
          UPLOAD_VERSION="${{ steps.upload.outputs.artifact_version }}"
          STAGING_DIR=$(mktemp -d)
          ROOT_TARGET="s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}"
          WIN_TARGET="${ROOT_TARGET}/windows/x64"

          pip3 install awscli --quiet

          aws s3 cp "$RELEASE_DIR/changelog.yml" "${ROOT_TARGET}/changelog.yml" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

          if [[ "$UPLOAD_VERSION" == dev-* ]]; then
            EXISTING_DEV_FILES=$(aws s3 ls "${WIN_TARGET}/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              | awk '{print $4}' \
              | grep -- '-dev-' || true)
            for existing in $EXISTING_DEV_FILES; do
              echo "Removing stale dev artifact: $existing"
              aws s3 rm "${WIN_TARGET}/$existing" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            done
          fi

          for f in "$RELEASE_DIR"/*.exe "$RELEASE_DIR"/*.blockmap; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if [[ "$UPLOAD_VERSION" == dev-* ]]; then
              TARGET_NAME="${BASENAME//-${VERSION}-/-${UPLOAD_VERSION}-}"
            else
              TARGET_NAME="$BASENAME"
            fi
            cp "$f" "$STAGING_DIR/$TARGET_NAME"
          done

          if [ "$UPLOAD_VERSION" != "dev" ]; then
            cp "$RELEASE_DIR"/latest.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") to windows/x64..."
            aws s3 cp "$f" "${WIN_TARGET}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  cleanup:
    runs-on: ubuntu-latest
    needs: [build-mac-x64, build-mac-arm64, build-win]
    if: always() && contains(fromJSON('["success","skipped"]'), needs.build-mac-x64.result) && contains(fromJSON('["success","skipped"]'), needs.build-mac-arm64.result) && contains(fromJSON('["success","skipped"]'), needs.build-win.result) && (needs.build-mac-x64.result == 'success' || needs.build-mac-arm64.result == 'success' || needs.build-win.result == 'success')
    steps:
      - name: Clean old versions on R2 (keep latest 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip3 install awscli --quiet

          clean_mac_dir() {
            local prefix="$1"
            local zips
            local count
            zips=$(aws s3 ls "s3://${R2_BUCKET}/${prefix}/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              | grep '\.zip$' | grep -v '\.blockmap' | grep -v -- '-dev-' | sort -k1,1r -k2,2r | awk '{print $4}')
            count=0
            for zip in $zips; do
              count=$((count + 1))
              if [ $count -gt 3 ]; then
                echo "Deleting old macOS artifact: ${prefix}/$zip"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}/$zip" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT }}"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}/${zip}.blockmap" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
              fi
            done
          }

          clean_mac_dir "${R2_RELEASE_PREFIX}/macos/x64"
          clean_mac_dir "${R2_RELEASE_PREFIX}/macos/arm64"

          EXES=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.exe$' | grep -v '\.blockmap' | grep -v -- '-dev-' | sort -k1,1r -k2,2r | awk '{print $4}')
          COUNT=0
          for exe in $EXES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old Windows artifact: windows/x64/$exe"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/$exe" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/windows/x64/${exe}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done
