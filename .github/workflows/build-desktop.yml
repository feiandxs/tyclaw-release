              if asset['name'] == 'uv-aarch64-apple-darwin.tar.gz':
                  print(asset['browser_download_url'])
                  break
          else:
              raise SystemExit('Unable to find uv-aarch64-apple-darwin.tar.gz')
          PY
          )
          echo "Downloading uv from $UV_ASSET_URL"
          curl -fSL "$UV_ASSET_URL" -o "$TMP_DIR/uv.tar.gz"
          tar -xzf "$TMP_DIR/uv.tar.gz" -C "$TMP_DIR"
          cp "$TMP_DIR/uv-aarch64-apple-darwin/uv" resources/bin/uv
