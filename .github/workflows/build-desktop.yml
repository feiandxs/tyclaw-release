        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.arch }}
          workspaces: |
            source/crates -> target

      - name: Build tailos CLI (arm64)
        working-directory: source
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release -p tailos-cli --target aarch64-apple-darwin --manifest-path crates/Cargo.toml
