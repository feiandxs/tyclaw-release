name: Build Desktop Release

on:
  repository_dispatch:
    types: [build-release]

# ── 全局环境变量 ─────────────────────────────────────────────
env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"
  R2_BUCKET: "files"
  R2_RELEASE_PREFIX: "releases/tyclaw"

jobs:
  # ────────────────────────────────────────────────────────────
  # macOS 构建（签名 + 公证）
  # ────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Clone source from GitLab
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          git clone --depth 1 --branch "$TAG" \
            "https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git" \
            source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: |
          pnpm exec tsc --skipLibCheck
          pnpm exec vite build
          node scripts/build-main.mjs

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          # Decode the base64 cert using node (avoids shell/base64 CLI issues)
          CERT_FILE="/tmp/tyclaw-cert.p12"
          node -e "require('fs').writeFileSync('$CERT_FILE', Buffer.from(process.env.CSC_LINK, 'base64'))"
          echo "Cert file size: $(wc -c < "$CERT_FILE") bytes"

          # Create and configure keychain
          KEYCHAIN_FILE="/tmp/tyclaw-build.keychain-db"
          KEYCHAIN_PASSWORD="actions_build_pw"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          # Import cert with empty password
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "Certificate imported successfully"
          security find-identity -v -p codesigning "$KEYCHAIN_FILE"

          rm -f "$CERT_FILE"

      - name: Package macOS app
        working-directory: source/apps/desktop
        env:
          # Skip electron-builder's own cert import since we did it manually
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac --publish never

      - name: Generate latest-mac.yml
        working-directory: source/apps/desktop
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          node scripts/generate-latest-mac-yml.mjs "$VERSION" "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"

      - name: Upload to R2
        working-directory: source/apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"

          brew install awscli 2>/dev/null || pip3 install awscli --quiet --break-system-packages

          for f in "$RELEASE_DIR"/*.zip "$RELEASE_DIR"/*.blockmap "$RELEASE_DIR"/latest-mac.yml; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")..."
            aws s3 cp "$f" "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  # ────────────────────────────────────────────────────────────
  # Windows 构建（无签名）
  # ────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: Clone source from GitLab
        run: |
          $TAG = "${{ github.event.client_payload.tag }}"
          git clone --depth 1 --branch $TAG `
            "https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git" `
            source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: |
          pnpm exec tsc --skipLibCheck
          pnpm exec vite build
          node scripts/build-main.mjs

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Package Windows app (unsigned)
        working-directory: source/apps/desktop
        run: pnpm exec electron-builder --win --publish never

      - name: Generate latest.yml for Windows auto-update
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          node -e "
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const I18N_MARKER = '__TYCLAW_I18N_RELEASE_NOTES__:';
          const LANGUAGES = ['en', 'zh-CN', 'zh-HK'];

          function toYamlLiteral(value) {
            const normalized = value.replace(/\r\n/g, '\n').trim();
            if (!normalized) return '\"\"';
            return '|-\n' + normalized.split('\n').map(l => '  ' + l).join('\n');
          }

          function loadReleaseNotes(appDir, version) {
            const localizedDir = path.join(appDir, 'release-notes', version);
            try {
              if (fs.statSync(localizedDir).isDirectory()) {
                const notes = {};
                for (const lang of LANGUAGES) {
                  try { const c = fs.readFileSync(path.join(localizedDir, lang + '.md'), 'utf8').trim(); if (c) notes[lang] = c; } catch {}
                }
                const fallback = notes['zh-CN'] || notes['en'] || Object.values(notes)[0];
                if (!fallback) return '';
                return I18N_MARKER + JSON.stringify({ default: fallback, locales: notes });
              }
            } catch {}
            try { const c = fs.readFileSync(path.join(appDir, 'release-notes', version + '.md'), 'utf8').trim(); if (c) return c; } catch {}
            return '';
          }

          const version = process.argv[1];
          const appDir = process.cwd();
          const releaseDir = path.join('release', version);
          const ymlPath = path.join(releaseDir, 'latest.yml');
          if (fs.existsSync(ymlPath)) { console.log('latest.yml already exists'); process.exit(0); }

          const files = fs.readdirSync(releaseDir);
          const exe = files.find(f => f.endsWith('.exe') && !f.endsWith('.blockmap'));
          if (!exe) { console.error('No exe found in ' + releaseDir); process.exit(1); }

          const filePath = path.join(releaseDir, exe);
          const buffer = fs.readFileSync(filePath);
          const sha512 = crypto.createHash('sha512').update(buffer).digest('base64');
          const size = buffer.length;
          const releaseDate = new Date().toISOString();
          const releaseNotes = loadReleaseNotes(appDir, version);

          const lines = [
            'version: ' + version,
            'files:',
            '  - url: ' + exe,
            '    sha512: ' + sha512,
            '    size: ' + size,
            'path: ' + exe,
            'sha512: ' + sha512,
            \"releaseDate: '\" + releaseDate + \"'\",
          ];
          if (releaseNotes) {
            lines.push('releaseNotes: ' + toYamlLiteral(releaseNotes));
          }
          lines.push('');

          fs.writeFileSync(ymlPath, lines.join('\n'));
          console.log('Generated ' + ymlPath);
          " "$VERSION"

      - name: Upload to R2
        working-directory: source/apps/desktop
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"

          pip3 install awscli --quiet

          for f in "$RELEASE_DIR"/*.exe "$RELEASE_DIR"/*.blockmap "$RELEASE_DIR"/latest.yml; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")..."
            aws s3 cp "$f" "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  # ────────────────────────────────────────────────────────────
  # 清理旧版本（两个平台都构建完成后执行）
  # ────────────────────────────────────────────────────────────
  cleanup:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    if: always() && (needs.build-mac.result == 'success' || needs.build-win.result == 'success')
    steps:
      - name: Clean old versions on R2 (keep latest 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip3 install awscli --quiet

          # 清理旧版 macOS zip
          ZIPS=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.zip$' | grep -v '\.blockmap' | sort -r | awk '{print $4}')
          COUNT=0
          for zip in $ZIPS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old macOS artifact: $zip"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$zip" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/${zip}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done

          # 清理旧版 Windows exe
          EXES=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.exe$' | grep -v '\.blockmap' | sort -r | awk '{print $4}')
          COUNT=0
          for exe in $EXES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old Windows artifact: $exe"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$exe" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/${exe}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done
