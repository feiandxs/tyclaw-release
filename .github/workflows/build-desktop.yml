      - name: Download Bun runtime
        working-directory: source/apps/desktop
        run: |
          mkdir -p resources/bin
          echo "Downloading Bun for darwin-aarch64..."
          curl -fSL -o /tmp/bun.zip \
            "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-aarch64.zip"
          unzip -o /tmp/bun.zip -d /tmp/bun-extract
          cp /tmp/bun-extract/bun-darwin-aarch64/bun resources/bin/bun
          chmod +x resources/bin/bun
