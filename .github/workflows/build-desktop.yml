name: Build Desktop Release

on:
  repository_dispatch:
    types: [build-release]
  workflow_dispatch:
    inputs:
      os:
        description: "Target os-platform build"
        required: true
        default: all
        type: choice
        options:
          - all
          - macos-x64
          - macos-arm64
          - windows-x64
      tag:
        description: "Git tag to build (optional, defaults to default branch HEAD)"
        required: false
        type: string

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"
  R2_BUCKET: "files"
  R2_RELEASE_PREFIX: "releases/tyclaw"

jobs:
  build-mac-x64:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'macos-x64')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'macos-x64'))
      }}
    runs-on: macos-15-intel
    steps:
      - name: Clone source from GitLab
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi
          REPO_URL="https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if [ -n "$TAG" ]; then
            echo "Cloning tagged source: $TAG"
            git clone --depth 1 --branch "$TAG" "$REPO_URL" source
          else
            echo "No tag provided, cloning default branch HEAD"
            git clone --depth 1 "$REPO_URL" source
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Read source commit
        id: git_ref
        working-directory: source
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Source short SHA: $SHORT_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('source/pnpm-lock.yaml', 'source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('source/crates/Cargo.lock', 'source/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tailos CLI (x64)
        working-directory: source
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release -p tailos-cli --target x86_64-apple-darwin --manifest-path crates/Cargo.toml
          mkdir -p apps/desktop/resources/bin
          cp crates/target/x86_64-apple-darwin/release/tailos apps/desktop/resources/bin/tailos
          file apps/desktop/resources/bin/tailos

      - name: Download Bun runtime
        working-directory: source/apps/desktop
        run: |
          mkdir -p resources/bin
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
            BUN_ARCH="aarch64"
          else
            BUN_ARCH="x64"
          fi
          echo "Downloading Bun for darwin-${BUN_ARCH}..."
          curl -fSL -o /tmp/bun.zip \
            "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-${BUN_ARCH}.zip"
          unzip -o /tmp/bun.zip -d /tmp/bun-extract
          cp /tmp/bun-extract/bun-darwin-${BUN_ARCH}/bun resources/bin/bun
          chmod +x resources/bin/bun
          echo "Bun version: $(resources/bin/bun --version)"
          rm -rf /tmp/bun.zip /tmp/bun-extract

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: pnpm run build:release-assets

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Resolve upload channel
        id: upload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -n "$TAG" ]; then
            echo "artifact_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_version=dev-${{ steps.git_ref.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          CERT_FILE="/tmp/tyclaw-cert.p12"
          node -e "require('fs').writeFileSync('$CERT_FILE', Buffer.from(process.env.CSC_LINK, 'base64'))"

          KEYCHAIN_FILE="/tmp/tyclaw-build.keychain-db"
          KEYCHAIN_PASSWORD="actions_build_pw"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_FILE"
          rm -f "$CERT_FILE"

      - name: Package macOS x64 app
        working-directory: source/apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac zip --x64 --publish never

      - name: Verify macOS x64 release artifacts
        working-directory: source/apps/desktop
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"

          ZIP_FILE=$(find "$RELEASE_DIR" -maxdepth 1 -name '*.zip' | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Expected a macOS zip artifact in $RELEASE_DIR" >&2
            exit 1
          fi

          if [ ! -f "$RELEASE_DIR/latest-mac.yml" ]; then
            echo "Missing latest-mac.yml in $RELEASE_DIR" >&2
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          unzip -q "$ZIP_FILE" -d "$TMP_DIR"

          APP_BIN=$(find "$TMP_DIR" -path '*/TyClaw.app/Contents/MacOS/TyClaw' -type f | head -n 1)
          if [ -z "$APP_BIN" ]; then
            echo "Unable to find TyClaw binary inside $(basename "$ZIP_FILE")" >&2
            exit 1
          fi

          APP_ARCHS=$(lipo -archs "$APP_BIN")
          echo "x64 app architectures: $APP_ARCHS"
          if [[ "$APP_ARCHS" != *"x86_64"* ]]; then
            echo "Expected x64 binary, got: $APP_ARCHS" >&2
            exit 1
          fi

      - name: Upload macOS x64 artifacts to R2
        working-directory: source/apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"
          UPLOAD_VERSION="${{ steps.upload.outputs.artifact_version }}"
          STAGING_DIR=$(mktemp -d)
          ROOT_TARGET="s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}"
          MAC_TARGET="${ROOT_TARGET}/macos/x64"

          brew install awscli 2>/dev/null || pip3 install awscli --quiet --break-system-packages

          aws s3 cp "changelog.yml" "${ROOT_TARGET}/changelog.yml" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

          if [[ "$UPLOAD_VERSION" == dev-* ]]; then
            EXISTING_DEV_FILES=$(aws s3 ls "${MAC_TARGET}/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              | awk '{print $4}' \
              | grep -- '-dev-' || true)
            for existing in $EXISTING_DEV_FILES; do
              echo "Removing stale dev artifact: $existing"
              aws s3 rm "${MAC_TARGET}/$existing" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            done
          fi

          for f in "$RELEASE_DIR"/*.zip "$RELEASE_DIR"/*.blockmap; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if [[ "$UPLOAD_VERSION" == dev-* ]]; then
              TARGET_NAME="${BASENAME//-${VERSION}-/-${UPLOAD_VERSION}-}"
            else
              TARGET_NAME="$BASENAME"
            fi
            cp "$f" "$STAGING_DIR/$TARGET_NAME"
          done

          if [ "$UPLOAD_VERSION" != "dev" ]; then
            cp "$RELEASE_DIR"/latest-mac.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") to macos/x64..."
            aws s3 cp "$f" "${MAC_TARGET}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  build-mac-arm64:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'macos-arm64')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'macos-arm64'))
      }}
    runs-on: macos-latest
    steps:
      - name: Clone source from GitLab
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi
          REPO_URL="https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if [ -n "$TAG" ]; then
            echo "Cloning tagged source: $TAG"
            git clone --depth 1 --branch "$TAG" "$REPO_URL" source
          else
            echo "No tag provided, cloning default branch HEAD"
            git clone --depth 1 "$REPO_URL" source
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Read source commit
        id: git_ref
        working-directory: source
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Source short SHA: $SHORT_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('source/pnpm-lock.yaml', 'source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('source/crates/Cargo.lock', 'source/crates/**/Cargo.toml') }}
