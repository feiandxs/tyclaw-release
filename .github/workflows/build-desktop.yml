name: Build Desktop Release

on:
  repository_dispatch:
    types: [build-release]
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - windows
      tag:
        description: "Git tag to build (optional, defaults to default branch HEAD)"
        required: false
        type: string

# ── 全局环境变量 ─────────────────────────────────────────────
env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"
  R2_BUCKET: "files"
  R2_RELEASE_PREFIX: "releases/tyclaw"

jobs:
  # ────────────────────────────────────────────────────────────
  # macOS 构建（签名 + 公证）
  # ────────────────────────────────────────────────────────────
  build-mac:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'macos')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'macos'))
      }}
    runs-on: macos-latest
    steps:
      - name: Clone source from GitLab
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi
          REPO_URL="https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if [ -n "$TAG" ]; then
            echo "Cloning tagged source: $TAG"
            git clone --depth 1 --branch "$TAG" "$REPO_URL" source
          else
            echo "No tag provided, cloning default branch HEAD"
            git clone --depth 1 "$REPO_URL" source
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('source/pnpm-lock.yaml', 'source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('source/crates/Cargo.lock', 'source/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tailos CLI (Universal Binary)
        working-directory: source
        run: |
          # Add targets for both architectures
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          
          # Build for both architectures
          echo "Building for x86_64..."
          cargo build --release -p tailos-cli --target x86_64-apple-darwin --manifest-path crates/Cargo.toml
          echo "Building for aarch64..."
          cargo build --release -p tailos-cli --target aarch64-apple-darwin --manifest-path crates/Cargo.toml
          
          # Create resources dir
          mkdir -p apps/desktop/resources/bin
          
          # Merge tailos ahead of packaging. apps/desktop/electron-builder.json5
          # must keep mac.x64ArchFiles aligned with this output path, otherwise
          # @electron/universal will try to merge it again and fail the build.
          echo "Merging into universal binary..."
          lipo -create \
            crates/target/x86_64-apple-darwin/release/tailos \
            crates/target/aarch64-apple-darwin/release/tailos \
            -output apps/desktop/resources/bin/tailos
          
          # Verify the architecture
          echo "Verifying architecture:"
          file apps/desktop/resources/bin/tailos

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: pnpm run build:release-assets

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Resolve upload channel
        id: upload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -n "$TAG" ]; then
            echo "artifact_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=true" >> "$GITHUB_OUTPUT"
            echo "Upload artifacts will keep versioned filenames."
          else
            echo "artifact_version=dev" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=false" >> "$GITHUB_OUTPUT"
            echo "Upload artifacts will use dev filenames only."
          fi

      - name: Build macOS unpacked app
        working-directory: source/apps/desktop
        run: pnpm run package:dir:mac

      - name: Smoke test macOS unpacked app
        working-directory: source/apps/desktop
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          APP_BIN=$(find "release/${VERSION}" -path '*/TyClaw.app/Contents/MacOS/TyClaw' -type f | head -n 1)
          if [ -z "$APP_BIN" ]; then
            echo "Unable to find macOS app binary under release/${VERSION}" >&2
            exit 1
          fi
          node scripts/smoke-test-app.mjs "$APP_BIN"

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          # Decode the base64 cert using node (avoids shell/base64 CLI issues)
          CERT_FILE="/tmp/tyclaw-cert.p12"
          node -e "require('fs').writeFileSync('$CERT_FILE', Buffer.from(process.env.CSC_LINK, 'base64'))"
          echo "Cert file size: $(wc -c < "$CERT_FILE") bytes"

          # Create and configure keychain
          KEYCHAIN_FILE="/tmp/tyclaw-build.keychain-db"
          KEYCHAIN_PASSWORD="actions_build_pw"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          # Import cert with empty password
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "Certificate imported successfully"
          security find-identity -v -p codesigning "$KEYCHAIN_FILE"

          rm -f "$CERT_FILE"

      - name: Package macOS universal app
        working-directory: source/apps/desktop
        env:
          # Skip electron-builder's own cert import since we did it manually
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac zip --universal --publish never

      - name: Verify macOS release artifacts
        working-directory: source/apps/desktop
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"

          ZIP_FILE=$(find "$RELEASE_DIR" -maxdepth 1 -name '*.zip' | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Expected a macOS zip artifact in $RELEASE_DIR" >&2
            exit 1
          fi

          if [ ! -f "$RELEASE_DIR/latest-mac.yml" ]; then
            echo "Missing latest-mac.yml in $RELEASE_DIR" >&2
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          unzip -q "$ZIP_FILE" -d "$TMP_DIR"

          APP_BIN=$(find "$TMP_DIR" -path '*/TyClaw.app/Contents/MacOS/TyClaw' -type f | head -n 1)
          if [ -z "$APP_BIN" ]; then
            echo "Unable to find TyClaw binary inside $(basename "$ZIP_FILE")" >&2
            exit 1
          fi

          APP_ARCHS=$(lipo -archs "$APP_BIN")
          echo "Universal app architectures: $APP_ARCHS"

          if [[ "$APP_ARCHS" != *"x86_64"* || "$APP_ARCHS" != *"arm64"* ]]; then
            echo "Expected universal binary with x86_64 and arm64, got: $APP_ARCHS" >&2
            exit 1
          fi

      - name: Prepare changelog
        working-directory: source/apps/desktop
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          mkdir -p "release/${VERSION}"
          cp changelog.yml "release/${VERSION}/"

      - name: Upload to R2
        working-directory: source/apps/desktop
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"
          UPLOAD_VERSION="${{ steps.upload.outputs.artifact_version }}"
          STAGING_DIR=$(mktemp -d)

          brew install awscli 2>/dev/null || pip3 install awscli --quiet --break-system-packages

          cp "$RELEASE_DIR"/changelog.yml "$STAGING_DIR"/

          for f in "$RELEASE_DIR"/*.zip "$RELEASE_DIR"/*.blockmap; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if [ "$UPLOAD_VERSION" = "dev" ]; then
              TARGET_NAME="${BASENAME//-${VERSION}-/-dev-}"
            else
              TARGET_NAME="$BASENAME"
            fi
            cp "$f" "$STAGING_DIR/$TARGET_NAME"
          done

          if [ "$UPLOAD_VERSION" != "dev" ]; then
            cp "$RELEASE_DIR"/latest-mac.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")..."
            aws s3 cp "$f" "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  # ────────────────────────────────────────────────────────────
  # Windows 构建（无签名）
  # ────────────────────────────────────────────────────────────
  build-win:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.os == 'all' || github.event.inputs.os == 'windows')) ||
        (github.event_name == 'repository_dispatch' && (github.event.client_payload.os == '' || github.event.client_payload.os == 'all' || github.event.client_payload.os == 'windows'))
      }}
    runs-on: windows-latest
    steps:
      - name: Clone source from GitLab
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $TAG = "${{ github.event.inputs.tag }}"
          } else {
            $TAG = "${{ github.event.client_payload.tag }}"
          }
          $repoUrl = "https://${{ secrets.GITLAB_DEPLOY_TOKEN_USER }}:${{ secrets.GITLAB_DEPLOY_TOKEN_PASS }}@gitlab.apexdata.com.cn/ty/tyclaw.git"
          if ($TAG) {
            Write-Host "Cloning tagged source: $TAG"
            git clone --depth 1 --branch $TAG $repoUrl source
          } else {
            Write-Host "No tag provided, cloning default branch HEAD"
            git clone --depth 1 $repoUrl source
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('source/pnpm-lock.yaml', 'source/apps/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: source
        run: pnpm --filter './packages/*' build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('source/crates/Cargo.lock', 'source/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tailos CLI
        working-directory: source
        shell: bash
        run: |
          cargo build --release -p tailos-cli --manifest-path crates/Cargo.toml
          mkdir -p apps/desktop/resources/bin
          cp crates/target/release/tailos.exe apps/desktop/resources/bin/

      - name: Build desktop (renderer + main)
        working-directory: source/apps/desktop
        run: pnpm run build:release-assets

      - name: Hoist external deps for asar
        working-directory: source/apps/desktop
        run: node scripts/hoist-external-deps.mjs hoist

      - name: Read version from package.json
        id: pkg
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Resolve upload channel
        id: upload
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -n "$TAG" ]; then
            echo "artifact_version=${{ steps.pkg.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=true" >> "$GITHUB_OUTPUT"
            echo "Upload artifacts will keep versioned filenames."
          else
            echo "artifact_version=dev" >> "$GITHUB_OUTPUT"
            echo "explicit_tag=false" >> "$GITHUB_OUTPUT"
            echo "Upload artifacts will use dev filenames only."
          fi

      - name: Build Windows unpacked app
        working-directory: source/apps/desktop
        run: pnpm run package:dir:win

      - name: Smoke test Windows unpacked app
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          APP_EXE=$(find "release/${VERSION}" -path '*/win-unpacked/TyClaw.exe' -type f | head -n 1)
          if [ -z "$APP_EXE" ]; then
            echo "Unable to find Windows app executable under release/${VERSION}" >&2
            exit 1
          fi
          node scripts/smoke-test-app.mjs "$APP_EXE"

      - name: Package Windows app (unsigned)
        working-directory: source/apps/desktop
        run: pnpm run package:release:win

      - name: Prepare changelog
        working-directory: source/apps/desktop
        shell: bash
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          mkdir -p "release/${VERSION}"
          cp changelog.yml "release/${VERSION}/"

      - name: Upload to R2
        working-directory: source/apps/desktop
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          RELEASE_DIR="release/${VERSION}"
          UPLOAD_VERSION="${{ steps.upload.outputs.artifact_version }}"
          STAGING_DIR=$(mktemp -d)

          pip3 install awscli --quiet

          cp "$RELEASE_DIR"/changelog.yml "$STAGING_DIR"/

          for f in "$RELEASE_DIR"/*.exe "$RELEASE_DIR"/*.blockmap; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if [ "$UPLOAD_VERSION" = "dev" ]; then
              TARGET_NAME="${BASENAME//-${VERSION}-/-dev-}"
            else
              TARGET_NAME="$BASENAME"
            fi
            cp "$f" "$STAGING_DIR/$TARGET_NAME"
          done

          if [ "$UPLOAD_VERSION" != "dev" ]; then
            cp "$RELEASE_DIR"/latest.yml "$STAGING_DIR"/
          fi

          for f in "$STAGING_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")..."
            aws s3 cp "$f" "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$(basename "$f")" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

  # ────────────────────────────────────────────────────────────
  # 清理旧版本（两个平台都构建完成后执行）
  # ────────────────────────────────────────────────────────────
  cleanup:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    if: always() && contains(fromJSON('["success","skipped"]'), needs.build-mac.result) && contains(fromJSON('["success","skipped"]'), needs.build-win.result) && (needs.build-mac.result == 'success' || needs.build-win.result == 'success')
    steps:
      - name: Clean old versions on R2 (keep latest 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip3 install awscli --quiet

          # 清理旧版 macOS zip
          ZIPS=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.zip$' | grep -v '\.blockmap' | sort -r | awk '{print $4}')
          COUNT=0
          for zip in $ZIPS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old macOS artifact: $zip"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$zip" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/${zip}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done

          # 清理旧版 Windows exe
          EXES=$(aws s3 ls "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            | grep '\.exe$' | grep -v '\.blockmap' | sort -r | awk '{print $4}')
          COUNT=0
          for exe in $EXES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Deleting old Windows artifact: $exe"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/$exe" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              aws s3 rm "s3://${R2_BUCKET}/${R2_RELEASE_PREFIX}/${exe}.blockmap" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}" 2>/dev/null || true
            fi
          done
